name: verify-docs
# Runs the runbook's structural checks (internal links, placeholders, single
# canonical address table) on every push and PR. See scripts/verify.py.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate docs
        run: python3 scripts/verify.py
